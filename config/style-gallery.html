<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Forge — 风格画廊</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #0a0a0f;
    color: #e0e0e6;
    min-height: 100vh;
}

/* ── Header ── */
.header {
    position: sticky;
    top: 0;
    background: rgba(10, 10, 15, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 16px 24px;
    z-index: 200;
}
.header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
}
.header-title {
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.header-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}
.provider-group {
    display: flex;
    align-items: center;
    gap: 6px;
}
.provider-label {
    font-size: 12px;
    color: #86868b;
}
.provider-btn {
    padding: 4px 12px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: #86868b;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
}
.provider-btn:hover { border-color: rgba(255,255,255,0.3); color: #ccc; }
.provider-btn.active {
    background: rgba(102,126,234,0.2);
    border-color: #667eea;
    color: #667eea;
}
.model-select {
    background: #1a1a24;
    border: 1px solid rgba(255,255,255,0.1);
    color: #bbb;
    padding: 4px 8px;
    border-radius: 14px;
    font-size: 12px;
    outline: none;
    cursor: pointer;
}
.model-select:hover { border-color: rgba(255,255,255,0.3); }
.header-stats {
    font-size: 13px;
    color: #86868b;
}
.scene-tabs {
    display: flex;
    gap: 4px;
    margin-top: 12px;
    width: 100%;
}
.scene-tab {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: #86868b;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
}
.scene-tab:hover { border-color: rgba(255,255,255,0.3); color: #ccc; }
.scene-tab.active {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-color: transparent;
    color: white;
    font-weight: 500;
}

/* ── Main ── */
.main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
}

.scene-section {
    margin-bottom: 48px;
}
.scene-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #fff;
}
.scene-desc {
    font-size: 13px;
    color: #86868b;
    margin-bottom: 20px;
}

/* ── Style Grid ── */
.style-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
}

/* ── Style Card ── */
.style-card {
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
}
.style-card:hover {
    border-color: rgba(255,255,255,0.2);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.style-card.selected {
    border-color: #667eea;
    box-shadow: 0 0 0 2px rgba(102,126,234,0.3), 0 8px 32px rgba(0,0,0,0.3);
}

.card-preview {
    height: 160px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}
.card-preview .style-icon {
    font-size: 48px;
    z-index: 1;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
}
.card-preview img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0.95;
    background: #111118;
}
.card-preview::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
}

.card-body {
    padding: 16px;
}
.card-name {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
    color: #fff;
}
.card-id {
    font-size: 12px;
    color: #667eea;
    font-family: "SF Mono", "Cascadia Code", monospace;
    margin-bottom: 8px;
}
.card-keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 10px;
}
.card-keyword {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    color: #aaa;
}
.card-meta {
    font-size: 12px;
    color: #666;
    display: flex;
    gap: 12px;
}

/* ── Style Color Themes ── */
.theme-visual_note { background: linear-gradient(135deg, #f8f9fa, #e3f2fd, #fff3e0); }
.theme-hand_drawn { background: linear-gradient(135deg, #ffecd2, #fcb69f, #ff9a9e); }
.theme-mono_bw { background: linear-gradient(135deg, #ffffff, #e0e0e0, #424242); }
.theme-business { background: linear-gradient(135deg, #1a237e, #283593, #e8eaf6); }
.theme-cyberpunk { background: linear-gradient(135deg, #0d0221, #0a0a2e, #00f0ff, #ff00ff); }
.theme-collage { background: linear-gradient(135deg, #fff9c4, #c8e6c9, #ffcc80); }
.theme-tropical { background: linear-gradient(135deg, #1b5e20, #2e7d32, #f9a825); }
.theme-illustration { background: linear-gradient(135deg, #fff8e1, #e8f5e9, #bbdefb); }
.theme-kawaii { background: linear-gradient(135deg, #fce4ec, #f8bbd0, #f48fb1); }
.theme-warm_healing { background: linear-gradient(135deg, #fff3e0, #ffe0b2, #ffccbc); }
.theme-watercolor { background: linear-gradient(135deg, #e1f5fe, #b3e5fc, #e0f2f1); }
.theme-tech_blueprint { background: linear-gradient(135deg, #0d47a1, #1565c0, #e3f2fd); }
.theme-retro_pop { background: linear-gradient(135deg, #f44336, #ffeb3b, #2196f3); }
.theme-scrapbook { background: linear-gradient(135deg, #d7ccc8, #a1887f, #ffcc80); }
.theme-clay_doodle { background: linear-gradient(135deg, #c1694f, #e8d5b7, #8b7355); }
.theme-vector { background: linear-gradient(135deg, #2d3436, #0984e3, #ffeaa7); }
.theme-tech { background: linear-gradient(135deg, #0a0e27, #1a237e, #00bcd4); }
.theme-blueprint { background: linear-gradient(135deg, #e3f2fd, #bbdefb, #0d47a1); }
.theme-sketch { background: linear-gradient(135deg, #fafafa, #eee, #bdbdbd); }
.theme-minimal { background: linear-gradient(135deg, #ffffff, #f5f5f5, #e0e0e0); }
.theme-ppt_retro_pop { background: linear-gradient(135deg, #ff6b6b, #4ecdc4, #ffd93d); }
.theme-ppt_minimal { background: linear-gradient(135deg, #ffffff, #f5f5f5); }
.theme-ppt_cyberpunk { background: linear-gradient(135deg, #1a1a2e, #ff00ff, #00ffff); }
.theme-ppt_neo_brutalism { background: linear-gradient(135deg, #ff4d4d, #4d94ff, #ffd93d); }
.theme-ppt_swiss { background: linear-gradient(135deg, #007aff, #fff066, #9966ff); }
.theme-ppt_blueprint { background: linear-gradient(135deg, #ffffff, #66b8cc); }

/* ── Detail Panel ── */
.detail-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
}
.detail-overlay.show { display: flex; }
.detail-panel {
    background: #1a1a24;
    border-radius: 20px;
    width: 90%;
    max-width: 600px;
    max-height: 85vh;
    overflow-y: auto;
    border: 1px solid rgba(255,255,255,0.1);
}
.detail-header {
    padding: 24px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background: #1a1a24;
    z-index: 1;
}
.detail-name { font-size: 22px; font-weight: 700; color: #fff; }
.detail-close {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.08);
    color: #aaa;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
.detail-close:hover { background: rgba(255,255,255,0.15); }
.detail-body { padding: 24px; }
.detail-section { margin-bottom: 20px; }
.detail-section:last-child { margin-bottom: 0; }
.detail-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.detail-prompt {
    font-size: 13px;
    line-height: 1.6;
    color: #bbb;
    background: rgba(255,255,255,0.04);
    padding: 12px 16px;
    border-radius: 10px;
    font-family: "SF Mono", "Cascadia Code", monospace;
    max-height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
}
.nl-example {
    background: #0d1117;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    color: #7ee787;
    line-height: 1.5;
    cursor: pointer;
    transition: border-color 0.2s;
    position: relative;
    margin-bottom: 8px;
}
.nl-example:last-child { margin-bottom: 0; }
.nl-example:hover { border-color: #667eea; }
.nl-example .copy-hint {
    position: absolute;
    top: 8px;
    right: 12px;
    font-size: 11px;
    color: #666;
}
.cli-ref {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: "SF Mono", "Cascadia Code", monospace;
    font-size: 11px;
    color: #666;
    line-height: 1.6;
    cursor: pointer;
    transition: border-color 0.2s;
}
.cli-ref:hover { border-color: rgba(255,255,255,0.15); }

/* ── Preview Image in Detail ── */
.detail-preview {
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
}
.detail-preview img {
    width: 100%;
    display: block;
    border-radius: 12px;
}

/* ── Responsive ── */
@media (max-width: 600px) {
    .style-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .card-preview { height: 120px; }
    .card-body { padding: 12px; }
    .header { padding: 12px 16px; }
    .scene-tabs { overflow-x: auto; flex-wrap: nowrap; }
    .header-controls { gap: 8px; }
}

/* ── Toast ── */
.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #667eea;
    color: white;
    padding: 10px 24px;
    border-radius: 24px;
    font-size: 14px;
    z-index: 400;
    transition: transform 0.3s ease;
    pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

<div class="header">

                <button class="provider-btn" data-provider="yunwu">云雾</button>
                <button class="provider-btn" data-provider="grsai">grsai</button>
            </div>
            <div class="provider-group" id="modelGroup">

    </div>
    <div class="scene-tabs" id="sceneTabs">
        <button class="scene-tab active" data-scene="all">全部</button>
        <button class="scene-tab" data-scene="cover">封面 (11)</button>
        <button class="scene-tab" data-scene="infographic">信息图 (5)</button>
        <button class="scene-tab" data-scene="freeform">自由生图 (6)</button>
        <button class="scene-tab" data-scene="ppt">PPT (6)</button>

</div>

<div class="main" id="mainContent"></div>

<div class="detail-overlay" id="detailOverlay">
    <div class="detail-panel">
        <div class="detail-header">
            <div class="detail-name" id="detailName"></div>
            <button class="detail-close" onclick="closeDetail()">&times;</button>
        </div>
        <div class="detail-body" id="detailBody"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

const SCENE_LABELS = {
    cover: '封面 Cover',
    infographic: '信息大图 Infographic',
    freeform: '自由生图 Freeform',
    ppt: 'PPT 幻灯片',
};

// ── State ──
let currentProvider = 'auto';
let currentModel = '';

// ── Model Selector ──
function updateModelSelect() {
    const sel = document.getElementById('modelSelect');
    const models = PROVIDER_MODELS[currentProvider] || [];
    sel.innerHTML = models.map(m =>
        `<option value="${m.id}" ${m.id === currentModel ? 'selected' : ''}>${m.name}</option>`
    ).join('');
    if (!models.find(m => m.id === currentModel)) {
        currentModel = models[0]?.id || '';
    }
}

// ── Render Cards ──
function renderCards(filterScene) {
    const main = document.getElementById('mainContent');
    main.innerHTML = '';

    const scenes = filterScene === 'all'
        ? ['cover', 'infographic', 'freeform', 'ppt']
        : [filterScene];

    scenes.forEach(scene => {
        const styles = STYLES[scene];
        if (!styles) return;

        const section = document.createElement('div');
        section.className = 'scene-section';
        section.innerHTML = `
            <div class="scene-title">${SCENE_LABELS[scene]}</div>
            <div class="scene-desc">${scene === 'cover' ? '公众号/小红书封面，11种高转化率风格' : scene === 'infographic' ? '高密度信息图，5种视觉风格' : scene === 'freeform' ? '自由描述任意图片，6种风格修饰' : '演示文稿幻灯片，6种设计风格'}</div>
            <div class="style-grid" id="grid-${scene}"></div>
        `;
        main.appendChild(section);

        const grid = document.getElementById(`grid-${scene}`);
        styles.forEach(s => {
            const card = document.createElement('div');
            card.className = 'style-card';
            card.setAttribute('data-style', s.id);
            card.setAttribute('data-scene', scene);

            const themeClass = `theme-${s.id.replace('ppt_', '')}`;
            const ratio = s.ratio || (s.ratios ? s.ratios.join(', ') : '4:3');
            const kwHtml = s.keywords.slice(0, 4).map(k => `<span class="card-keyword">${k}</span>`).join('');

            let previewHtml;
            if (s.preview) {
                previewHtml = `<img src="${s.preview}" alt="${s.name}" style="width:100%;height:100%;object-fit:contain;opacity:0.95;background:#111118" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="style-icon" style="display:none">${s.icon}</div>`;
            } else {
                previewHtml = `<div class="style-icon">${s.icon}</div>`;
            }

            card.innerHTML = `
                <div class="card-preview ${themeClass}">
                    ${previewHtml}
                </div>
                <div class="card-body">
                    <div class="card-name">${s.name}</div>
                    <div class="card-id">${s.id}</div>
                    <div class="card-keywords">${kwHtml}</div>
                    <div class="card-meta">
                        <span>${ratio}</span>
                    </div>
                </div>
            `;
            card.addEventListener('click', () => openDetail(s, scene));
            grid.appendChild(card);
        });
    });
}

// ── Detail Panel ──
function openDetail(style, scene) {
    const overlay = document.getElementById('detailOverlay');
    document.getElementById('detailName').textContent = `${style.icon} ${style.name}`;

    const ratio = style.ratio || (style.ratios ? style.ratios.join(' / ') : '4:3');
    const providerArg = currentProvider !== 'auto' ? `  --provider ${currentProvider} \\\n` : '';
    const modelArg = currentModel ? `  --model ${currentModel} \\\n` : '';
    const cliCommand = `python .claude/skills/image/scripts/generate.py \\\n  --config .claude/skills/image/config/engine.json \\\n${providerArg}${modelArg}  --style ${style.id} --prompt "your prompt" \\\n  --out "30_内容创作/32_草稿箱/output.jpg"`;

    // Preview image in detail
    let previewHtml = '';
    if (style.preview) {
        previewHtml = `<div class="detail-section">
            <div class="detail-preview"><img src="${style.preview}" alt="${style.name}" onerror="this.parentElement.style.display='none'"></div>
        </div>`;
    }

    // Natural language examples (PRIMARY)
    const nlHtml = (style.nlExamples || []).map(ex =>
        `<div class="nl-example" onclick="copyText('${ex.replace(/'/g, "\\'")}')" title="点击复制">
            <span class="copy-hint">点击复制</span>
            ${ex}
        </div>`
    ).join('');

    document.getElementById('detailBody').innerHTML = `
        ${previewHtml}
        <div class="detail-section">
            <div class="detail-label">怎么用（直接说）</div>
            ${nlHtml}
        </div>
        <div class="detail-section">
            <div class="detail-label">关键词</div>
            <div class="card-keywords">${style.keywords.map(k => `<span class="card-keyword">${k}</span>`).join('')}</div>
        </div>
        <div class="detail-section">
            <div class="detail-label">比例</div>
            <div style="color:#bbb">${ratio}</div>
        </div>
        <div class="detail-section">
            <div class="detail-label">Prompt 模板</div>
            <div class="detail-prompt">${style.prompt}</div>
        </div>
        <div class="detail-section">
            <div class="detail-label">CLI 参考（高级用户）</div>
            <div class="cli-ref" onclick="copyCommand(this)" title="点击复制">
                ${cliCommand}
            </div>
        </div>
    `;

    overlay.classList.add('show');

    // Highlight card
    document.querySelectorAll('.style-card').forEach(c => c.classList.remove('selected'));
    const card = document.querySelector(`.style-card[data-style="${style.id}"][data-scene="${scene}"]`);
    if (card) card.classList.add('selected');
}

function closeDetail() {
    document.getElementById('detailOverlay').classList.remove('show');
    document.querySelectorAll('.style-card').forEach(c => c.classList.remove('selected'));
}

// ── Scene Tabs ──
document.querySelectorAll('.scene-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.scene-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderCards(tab.dataset.scene);
    });
});

// ── Provider Selector ──
document.querySelectorAll('.provider-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.provider-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentProvider = btn.dataset.provider;
        updateModelSelect();
    });
});

// ── Model change ──
document.getElementById('modelSelect').addEventListener('change', (e) => {
    currentModel = e.target.value;
});

// ── Copy ──
function copyCommand(el) {
    const text = el.innerText.trim();
    copyText(text);
}
function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
        showToast('已复制到剪贴板');
    }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('已复制到剪贴板');
    });
}
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

// Close detail on overlay click
document.getElementById('detailOverlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeDetail();
});

// ESC to close
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeDetail();
});

// ── Init ──
updateModelSelect();
renderCards('all');
</script>
